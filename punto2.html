<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Celda de Manufactura XR</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- ========== ENTORNO ========== -->
      <a-plane
        position="0 0 -5"
        rotation="-90 0 0"
        width="20" height="20"
        color="#B0BEC5">
      </a-plane>

      <a-sky color="#CFD8DC"></a-sky>

      <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
      <a-light type="directional" position="2 4 -1" intensity="0.6"></a-light>


      <!-- ========== BANDA TRANSPORTADORA ========== -->
      <a-box
        position="0 0.2 -5"
        width="6" height="0.2" depth="1.2"
        color="#546E7A">
      </a-box>

      <a-box
        position="0 0.35 -5"
        width="5.8" height="0.05" depth="1"
        color="#37474F">
      </a-box>

      <a-cylinder
        position="-3 0.35 -5"
        radius="0.15" height="1.2"
        rotation="0 0 90"
        color="#78909C">
      </a-cylinder>

      <a-cylinder
        position="3 0.35 -5"
        radius="0.15" height="1.2"
        rotation="0 0 90"
        color="#78909C">
      </a-cylinder>

      <a-cylinder position="-2.5 0.1 -4.5" radius="0.06" height="0.4" color="#455A64"></a-cylinder>
      <a-cylinder position="2.5 0.1 -4.5" radius="0.06" height="0.4" color="#455A64"></a-cylinder>
      <a-cylinder position="-2.5 0.1 -5.5" radius="0.06" height="0.4" color="#455A64"></a-cylinder>
      <a-cylinder position="2.5 0.1 -5.5" radius="0.06" height="0.4" color="#455A64"></a-cylinder>


      <!-- ========== BRAZO ROBOTIZADO ========== -->
      <a-cylinder
        position="-4 0.3 -5"
        radius="0.4" height="0.6"
        color="#1565C0">
      </a-cylinder>

      <a-box
        position="-4 0.9 -5"
        width="0.5" height="0.6" depth="0.5"
        color="#1976D2">
      </a-box>

      <a-box
        position="-4 1.5 -5"
        width="0.2" height="0.8" depth="0.2"
        color="#1E88E5">
      </a-box>

      <a-sphere
        position="-4 2 -5"
        radius="0.15"
        color="#FFC107">
      </a-sphere>

      <a-box
        position="-3.5 2.3 -5"
        width="0.9" height="0.18" depth="0.18"
        rotation="0 0 -30"
        color="#1E88E5">
      </a-box>

      <a-box
        position="-2.9 2.1 -4.85"
        width="0.08" height="0.3" depth="0.08"
        color="#E53935">
      </a-box>

      <a-box
        position="-2.9 2.1 -5.15"
        width="0.08" height="0.3" depth="0.08"
        color="#E53935">
      </a-box>


      <!-- ========== TANQUE DE ALMACENAMIENTO ========== -->
      <a-cylinder
        position="4.5 1.2 -5"
        radius="0.8" height="2.4"
        color="#2E7D32">
      </a-cylinder>

      <a-cylinder
        position="4.5 2.45 -5"
        radius="0.85" height="0.1"
        color="#1B5E20">
      </a-cylinder>

      <a-cylinder
        position="3.7 0.5 -5"
        radius="0.07" height="0.8"
        rotation="0 0 90"
        color="#424242">
      </a-cylinder>

      <a-box
        position="3.3 0.5 -5"
        width="0.2" height="0.2" depth="0.2"
        color="#F57F17">
      </a-box>


      <!-- ========== SENSORES ========== -->
      <a-sphere
        position="-2.8 0.65 -4.3"
        radius="0.1"
        color="#00E676">
      </a-sphere>

      <a-sphere
        position="2.8 0.65 -4.3"
        radius="0.1"
        color="#FF1744">
      </a-sphere>

      <a-sphere
        position="5.35 1.5 -5"
        radius="0.1"
        color="#FFEA00">
      </a-sphere>


      <!-- ========== PIEZAS EN LA BANDA ========== -->
      <a-box
        position="-1.5 0.5 -5"
        width="0.4" height="0.25" depth="0.4"
        color="#FF7043">
      </a-box>

      <a-box
        position="0.5 0.5 -5"
        width="0.4" height="0.25" depth="0.4"
        color="#FF7043">
      </a-box>

      <a-box
        position="2 0.5 -5"
        width="0.4" height="0.25" depth="0.4"
        color="#FF7043">
      </a-box>


      <!-- ========== PANEL DE CONTROL ========== -->
      <a-box
        position="0 1.2 -7.5"
        width="2" height="1.5" depth="0.1"
        color="#263238">
      </a-box>

      <a-box
        position="0 1.35 -7.44"
        width="1.6" height="0.9" depth="0.01"
        color="#00BCD4">
      </a-box>

      <a-cylinder
        position="-0.5 0.75 -7.44"
        radius="0.1" height="0.02"
        rotation="90 0 0"
        color="#F44336">
      </a-cylinder>

      <a-cylinder
        position="0.5 0.75 -7.44"
        radius="0.1" height="0.02"
        rotation="90 0 0"
        color="#4CAF50">
      </a-cylinder>

      <a-cylinder position="-0.7 0.2 -7.5" radius="0.05" height="0.9" color="#37474F"></a-cylinder>
      <a-cylinder position="0.7 0.2 -7.5" radius="0.05" height="0.9" color="#37474F"></a-cylinder>

    </a-scene>
  </body>
</html>
